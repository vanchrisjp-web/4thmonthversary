# Cloudflare Worker (Static Assets) config.
#
# The whole static site is served from the repo root via the ASSETS binding, and
# worker.js adds the /api/content endpoint. This is what the project's Git deploy
# (`wrangler deploy`) expects. Mode A needs nothing more.
#
# The site also runs from file:// and any plain static host — this file is only
# read by Cloudflare/Wrangler.
#
# Mode B (optional — SAVE in /#edit publishes for everyone):
#   1. Create a KV namespace:  npx wrangler kv namespace create CONTENT
#   2. Uncomment [[kv_namespaces]] below and paste the id (or bind it in the
#      dashboard: your Worker -> Settings -> Bindings -> KV, variable name CONTENT).
#   3. Set the write password:  npx wrangler secret put EDIT_TOKEN
#      (or dashboard -> Settings -> Variables and Secrets -> add EDIT_TOKEN, Encrypt).
#   4. In /#edit -> Master -> "Token terbit (KV)", paste the same value.

name = "4thmonthversary"
main = "worker.js"
compatibility_date = "2024-11-01"

[assets]
directory = "."
binding = "ASSETS"

# --- Mode B only ---
# [[kv_namespaces]]
# binding = "CONTENT"
# id = "<your_namespace_id>"
